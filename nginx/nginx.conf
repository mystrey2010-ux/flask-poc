server {
    listen 80;
    server_name localhost;

    # Maximum file upload size (adjust if your future apps need large uploads)
    client_max_body_size 10M;

    # Route all traffic to the Flask Gunicorn container
    location / {
        proxy_pass http://flask_app:8000;
        
        # Standard proxy headers to pass correct IP data to Flask
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings for production stability
        proxy_connect_timeout 90s;
        proxy_read_timeout 90s;
    }
}
