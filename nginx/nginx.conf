# Required Global Settings
worker_processes auto;

# Required: Defines how Nginx handles network connections
events {
    worker_connections 1024;
}

# Required: Wraps all server configurations
http {
    include       /etc/nginx/mime.types;
    default_type application/octet-stream;

# Configure realip module for proper IP handling
    set_real_ip_from 172.19.0.0/16;
    set_real_ip_from 172.27.0.0/16;
    set_real_ip_from 192.168.50.0/24;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Custom log format to use real IP addresses
    log_format realip '$realip_remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" $http_x_forwarded_for';
    
    # Use custom log format for access logs
    access_log /var/log/nginx/access.log realip;

    # Ensure proper proxy headers for all locations
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # =========================================================================
    # 1. HTTP Server Block (Port 80)
    # =========================================================================
    server {
        listen 80;
        server_name mw-nexus.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host:8443$request_uri;
        }
    }

    # =========================================================================
    # 2. HTTPS Secure Server Block (Port 443)
    # =========================================================================
    server {
        listen 443 ssl;
        server_name mw-nexus.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/mw-nexus.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mw-nexus.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256';

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        client_max_body_size 10M;

        location / {
            proxy_pass http://flask_backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 90s;
            proxy_read_timeout 90s;
        }
    }
}
